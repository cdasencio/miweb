<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detector de Gemas 💎 PRO+</title>
<style>
body { font-family: Arial; background:#0b1220; color:#e5e7eb; padding:20px; }
h1 { color:#60a5fa; }
.table { width:100%; border-collapse:collapse; margin-top:15px; }
.table th, .table td { padding:10px; text-align:left; }
.table th { color:#9ca3af; }
.table tr { border-bottom:1px solid #1f2937; }
.green { color:#22c55e; }
.red { color:#ef4444; }
.badge { background:#111827; padding:4px 8px; border-radius:999px; }
.toolbar { margin-bottom:10px; display:flex; gap:10px; }
button { padding:10px; border:none; border-radius:8px; background:#60a5fa; cursor:pointer; }
#topSignal { margin-top:15px; padding:12px; background:#111827; border-radius:10px; }
.list { margin-top:20px; }

.contract {
  background:#111827;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  display:inline-block;
}

.buy-btn {
  background:#1f2937;
  color:#60a5fa;
  padding:6px 10px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.buy-btn:hover {
  background:#374151;
}
</style>
</head>
<body>

<h1>💎 Detector de Gemas PRO+</h1>

<div class="toolbar">
<button onclick="runDetector()">🔄 Actualizar</button>
<button onclick="toggleAuto()">⚡ Auto</button>
</div>

<p id="status"></p>
<div id="topSignal">Esperando datos...</div>

<h2>🔥 Entradas fuertes</h2>
<table class="table">
<thead>
<tr>
<th>Token</th>
<th>Precio</th>
<th>Volumen</th>
<th>Liquidez</th>
<th>Timing</th>
<th>Señal</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h2>🧠 Gemas tempranas</h2>
<div id="earlyGems" class="list"></div>

<h2>🌍 Ranking global</h2>
<table class="table">
<thead>
<tr>
<th>#</th>
<th>Token</th>
<th>Precio</th>
<th>24h %</th>
<th>Volumen</th>
<th>Probabilidad</th>
<th>Acción</th>
<th>Contrato</th>
<th>DEX</th>
<th>Comprar</th>
</tr>
</thead>
<tbody id="cmcList"></tbody>
</table>

<script>
let auto=false, interval;
let lastAlerts = {};

async function runDetector(){
  const status = document.getElementById('status');
  status.textContent = '⏳ Escaneando...';

  try{
    const res = await fetch('https://api.dexscreener.com/latest/dex/search?q=trend');
    const data = await res.json();

    const pairs = data?.pairs || [];

    const tokens = pairs.map(t=>{
      const liq = t.liquidity?.usd||0;
      const vol = t.volume?.h24||0;
      const chg = t.priceChange?.h24||0;
      const price = t.priceUsd||0;
      const address = t.baseToken.address || 'N/A';
      const dex = t.dexId || 'DEX';

      let score = 0;

      if(liq>150000) score+=3;
      else if(liq>80000) score+=2;

      if(vol>300000) score+=3;
      else if(vol>100000) score+=2;

      if(chg>0 && chg<20) score+=2;

      if(vol>50000 && chg<10 && liq>50000) score+=2;

      if(chg>35) score-=2;

      let early = false;
      if(vol>40000 && liq<90000 && chg<12 && chg>0){ early = true; score+=1; }

      return {name:t.baseToken.symbol, price, vol, liq, chg, score, early, address, dex};
    });

    renderStrong(tokens.filter(t=>t.score>=8));
    renderEarly(tokens.filter(t=>t.early).slice(0,5));
    renderCMC(tokens);
    checkAlerts(tokens);

    const best = [...tokens].sort((a,b)=>b.score - a.score)[0];
    highlightTop(best);

    status.textContent='✅ Listo';
  }catch(e){
    status.textContent='❌ Error';
    console.error(e);
  }
}

function getTiming(t){
  if(t.chg > 25) return '⛔ MUY TARDE';
  if(t.chg > 10) return '⌛ ESPERAR';
  return '⚡ ENTRAR';
}

function renderStrong(list){
  const body=document.getElementById('tableBody');
  let html='';

  list.forEach(t=>{
    html += `
    <tr>
      <td>${t.name}</td>
      <td>$${Number(t.price).toFixed(6)}</td>
      <td>$${Number(t.vol).toLocaleString()}</td>
      <td>$${Number(t.liq).toLocaleString()}</td>
      <td>${getTiming(t)}</td>
      <td>🟢 ENTRAR</td>
    </tr>`;
  });

  body.innerHTML = html;
}

function renderEarly(list){
  const box=document.getElementById('earlyGems');
  if(list.length===0){ box.textContent='❌ No early gems'; return; }

  box.innerHTML = list.map(t=>
    `<div>🧠 ${t.name} | Vol: $${Number(t.vol).toLocaleString()} | Liquidez: $${Number(t.liq).toLocaleString()}</div>`
  ).join('');
}

function renderCMC(list){
  const body=document.getElementById('cmcList');
  body.innerHTML='';

  const sorted = [...list].sort((a,b)=> b.score - a.score);

  sorted.forEach((t,i)=>{
    let prob = Math.min(t.score,10);
    const color = t.chg>=0 ? 'green':'red';

    let accion='❌ NO ENTRAR';
    if(t.early && prob>=6) accion='🧠 ACUMULANDO';
    if(prob>=8) accion='🟢 ENTRAR';
    else if(prob>=6) accion='🔵 VIGILAR';
    else if(prob===5) accion='🟡 INTERÉS BAJO';

    const dexLink = t.address !== 'N/A'
      ? `https://dexscreener.com/search?q=${t.address}`
      : '#';

    const buyLink = t.address !== 'N/A'
      ? `https://dexscreener.com/ethereum/${t.address}`
      : '#';

    body.innerHTML += `
    <tr>
      <td>#${i+1}</td>
      <td>${t.name}</td>
      <td>$${Number(t.price).toFixed(6)}</td>
      <td class="${color}">${Number(t.chg).toFixed(2)}%</td>
      <td>$${Number(t.vol).toLocaleString()}</td>
      <td><span class="badge">${prob}/10</span></td>
      <td>${accion}</td>
      <td><span class="contract">${t.address}</span></td>
      <td><a class="buy-btn" href="${dexLink}" target="_blank">📊 Ver</a></td>
      <td><a class="buy-btn" href="${buyLink}" target="_blank">🛒 DEX</a></td>
    </tr>`;
  });
}

function highlightTop(t){
  const box=document.getElementById('topSignal');
  if(!t){ box.textContent='Sin datos'; return; }
  box.innerHTML=`🔥 TOP: ${t.name} | ${t.score>=8?'ENTRAR':'OBSERVAR'}`;
}

function toggleAuto(){
  auto=!auto;
  if(auto){ runDetector(); interval=setInterval(runDetector,15000);} 
  else clearInterval(interval);
}

function checkAlerts(tokens){
  tokens.forEach(t=>{
    let prob = Math.min(t.score,10);

    if(prob>=8 && !lastAlerts[t.address]){
      lastAlerts[t.address]=true;

      const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
      audio.play().catch(()=>{});

      showAlert(`🚨 OPORTUNIDAD: ${t.name} (${prob}/10)`);
    }
  });
}

function showAlert(msg){
  const alertBox = document.createElement('div');
  alertBox.innerText = msg;

  alertBox.style.position = 'fixed';
  alertBox.style.bottom = '20px';
  alertBox.style.right = '20px';
  alertBox.style.background = '#111827';
  alertBox.style.color = '#60a5fa';
  alertBox.style.padding = '12px';
  alertBox.style.borderRadius = '10px';
  alertBox.style.boxShadow = '0 0 10px rgba(0,0,0,0.5)';
  alertBox.style.zIndex = 9999;

  document.body.appendChild(alertBox);
  setTimeout(()=>alertBox.remove(),5000);
}
</script>

</body>
</html>
