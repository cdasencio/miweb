<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DETECTOR PRO+</title>

<style>
body { font-family: Arial; background:#0b1220; color:#e5e7eb; padding:20px; }
h1 { color:#60a5fa; }

.panel { background:#111827; padding:12px; border-radius:10px; margin-top:10px; }

.table { width:100%; border-collapse:collapse; margin-top:10px; }
.table th,.table td { padding:8px; }
.table tr { border-bottom:1px solid #1f2937; }

.contract { font-size:11px; color:#9ca3af; word-break:break-all; }

button { padding:6px 10px; border:none; border-radius:8px; background:#60a5fa; cursor:pointer; }

.section { margin-top:25px; }

.lang {
  position:absolute;
  top:20px;
  right:20px;
}

.search-item{padding:8px;border-bottom:1px solid #1f2937;cursor:pointer}
.search-item:hover{background:#111827}
</style>
</head>

<body>

<h1>🚀 DETECTOR PRO+</h1>

<div class="lang">
<select onchange="setLang(this.value)">
<option value="es">Español</option>
<option value="en">Inglés</option>
<option value="pt">Portugués</option>
<option value="ar">Árabe</option>
</select>
</div>

<button onclick="runDetector()">🔄 <span data-t="update">Actualizar</span></button>
<button onclick="toggleAuto()">⚡ AUTO</button>

<p id="status"></p>

<!-- 🧨 EARLY -->
<div class="section">
<h2 data-t="early">🧨 Early Gems</h2>
<div id="pump"></div>
</div>

<!-- 📌 WATCHLIST -->
<div class="section">
<h2>📌 Watchlist</h2>

<input id="searchInput" placeholder="Buscar token o contrato">
<button onclick="searchTokens()">Buscar</button>
<button onclick="clearSearch()">Limpiar</button>

<div id="searchResults" class="panel"></div>

<br><br>

<select id="tokenSelect">
<option value="">🔽 Selecciona un token...</option>
</select>
<button onclick="addFromSelect()">Agregar</button>

<br><br>

<input id="pinInput" placeholder="Pegar contrato manual">
<button onclick="addPinned()">Pinear</button>

<div id="watch"></div>
</div>

<!-- 🔴 MAX -->
<div class="section">
<h2>🔴 Máxima Alerta</h2>
<div id="max"></div>
</div>

<!-- 📊 -->
<div class="section">
<h2>📊 Seguimiento</h2>
<div id="early"></div>
</div>

<!-- 🐋 -->
<div class="section">
<h2>🐋 Smart Money</h2>
<div id="whales"></div>
</div>

<!-- 🌍 -->
<div class="section">
<h2>🌍 Ranking (ordenado por Score según IA)</h2>
<table class="table">
<thead>
<tr>
<th>Token</th><th>Precio</th><th>%</th><th>Vol</th><th>Liq</th><th>Score según IA</th><th>DEX</th><th>Contrato</th><th></th>
</tr>
</thead>
<tbody id="rank"></tbody>
</table>
</div>

<script>
let tokens=[];
let pinned=JSON.parse(localStorage.getItem('pinned')||'[]');
let auto=false, interval;
const status=document.getElementById('status');

const T={
  es:{update:"Actualizar",early:"Early Gems"},
  en:{update:"Update",early:"Early Gems"},
  pt:{update:"Atualizar",early:"Early Gems"},
  ar:{update:"تحديث",early:"فرص مبكرة"}
};

function setLang(l){
  document.querySelectorAll('[data-t]').forEach(el=>{
    el.innerText=T[l][el.dataset.t];
  });
}

function score(t){
  let s=0;
  if(t.liq>200000) s+=3;
  if(t.vol>200000) s+=3;
  if(t.chg>2 && t.chg<20) s+=3;
  return Math.min(10,s);
}

function earlyScore(t){
  let s=0;
  if(t.liq>1000 && t.liq<80000) s+=3;
  if(t.vol>2000 && t.vol<100000) s+=2;
  if(t.chg>5 && t.chg<80) s+=2;
  if(t.age<12) s+=3;
  return Math.min(10,s);
}

function whaleSignal(t){
  return (t.txns?.h24?.buys||0) > (t.txns?.h24?.sells||0)*1.5;
}

async function runDetector(){
  status.innerText="⏳ Escaneando...";

  const queries=['new pair','fair launch','launch','pump','memecoin','dex new','trending','0x','solana','eth','bsc'];
  let all=[];

  for(const q of queries){
    try{
      let r=await fetch(`https://api.dexscreener.com/latest/dex/search?q=${q}`);
      let d=await r.json();
      if(d.pairs) all=all.concat(d.pairs);
    }catch{}
  }

  let map=new Map();
  all.forEach(t=>{
    if(t.baseToken?.address) map.set(t.baseToken.address,t);
  });

  tokens=Array.from(map.values()).map(t=>{
    let liq=t.liquidity?.usd||0;
    let vol=t.volume?.h24||0;
    let chg=t.priceChange?.h24||0;
    let age=t.pairCreatedAt?(Date.now()-t.pairCreatedAt)/3600000:999;

    return{
      name:t.baseToken.symbol,
      price:t.priceUsd||0,
      liq,vol,chg,age,
      address:t.baseToken.address,
      dex:t.dexId||'N/A',
      txns:t.txns,
      ai:score({liq,vol,chg}),
      early:earlyScore({liq,vol,chg,age}),
      whale:whaleSignal(t)
    };
  });

  render();
  status.innerText="✅ Datos cargados";
}

function render(){

  pump.innerHTML=tokens.filter(t=>t.early>=4)
    .sort((a,b)=>b.early-a.early)
    .slice(0,30)
    .map(t=>card(t)).join('');

  max.innerHTML=tokens.filter(t=>t.ai>=9)
    .map(t=>card(t)).join('');

  early.innerHTML=tokens.filter(t=>t.ai>=6 && t.ai<9)
    .map(t=>card(t)).join('');

  whales.innerHTML=tokens.filter(t=>t.whale)
    .map(t=>card(t)).join('');

  watch.innerHTML=pinned.map(addr=>{
    let t=tokens.find(x=>x.address===addr);
    return t?card(t,true):`<div class="panel">${addr}</div>`;
  }).join('');

  tokenSelect.innerHTML='';
  tokens.slice(0,50).forEach(t=>{
    let o=document.createElement('option');
    o.value=t.address;
    o.textContent=t.name;
    tokenSelect.appendChild(o);
  });

  rank.innerHTML=tokens.sort((a,b)=>b.ai-a.ai).slice(0,50).map(t=>`
    <tr>
      <td>${t.name}</td>
      <td>$${t.price}</td>
      <td>${t.chg}%</td>
      <td>${t.vol}</td>
      <td>${t.liq}</td>
      <td>${t.ai}/10</td>
      <td>${t.dex}</td>
      <td class="contract">${t.address}</td>
      <td><button onclick="pin('${t.address}')">📌</button></td>
    </tr>
  `).join('');
}

function card(t,remove=false){
  return `<div class="panel">
    <b>${t.name}</b> ${t.whale?'🐋':''}<br>
    $${t.price}<br>
    ${t.chg}%<br>
    Score según IA: ${t.ai}/10<br>
    Early: ${t.early}/10<br>
    Vol: ${t.vol} | Liq: ${t.liq}<br>
    <div class="contract">${t.address}</div>
    ${remove?`<button onclick="removePin('${t.address}')">❌</button>`:`<button onclick="pin('${t.address}')">📌</button>`}
  </div>`;
}

function searchTokens(){
  let q=searchInput.value.toLowerCase();
  searchResults.innerHTML=tokens.filter(t=>t.name.toLowerCase().includes(q)||t.address.toLowerCase().includes(q)).map(t=>card(t)).join('');
}

function clearSearch(){searchInput.value='';searchResults.innerHTML='';}

function addFromSelect(){if(tokenSelect.value) pin(tokenSelect.value);}

function addPinned(){let v=pinInput.value.trim();if(v) pin(v);}

function pin(a){
  if(!pinned.includes(a)) pinned.push(a);
  localStorage.setItem('pinned',JSON.stringify(pinned));
  render();
}

function removePin(a){
  pinned=pinned.filter(x=>x!==a);
  localStorage.setItem('pinned',JSON.stringify(pinned));
  render();
}

function toggleAuto(){
  auto=!auto;
  if(auto){runDetector();interval=setInterval(runDetector,15000);}else clearInterval(interval);
}

runDetector();
</script>

</body>
</html>
